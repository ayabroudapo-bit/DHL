<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚚 DHL Tracking System</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Arial Black', Arial, sans-serif;
  background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3);
  color: #333;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 25px;
  padding: 40px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 3em;
  background: linear-gradient(45deg, #111, #333);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.search-box {
  position: relative;
  margin-bottom: 30px;
}

#searchInput {
  width: 100%;
  padding: 25px 60px 25px 25px;
  font-size: 24px;
  font-weight: bold;
  border: 3px solid #ddd;
  border-radius: 20px;
  background: white;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  transition: all 0.3s;
}

#searchInput:focus {
  outline: none;
  border-color: #ff6b6b;
  box-shadow: 0 15px 40px rgba(255, 107, 107, 0.3);
  transform: scale(1.02);
}

.search-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(45deg, #ff6b6b, #feca57);
  color: white;
  border: none;
  padding: 15px 20px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
  transition: all 0.3s;
}

.search-btn:hover {
  transform: translateY(-50%) scale(1.1);
  box-shadow: 0 15px 35px rgba(255, 107, 107, 0.6);
}

/* 🔐 ADMIN BUTTON */
.admin-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(45deg, #111, #333);
  color: #ffcc00;
  border: none;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
  transition: all 0.3s;
  z-index: 1000;
}

.admin-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
}

/* RESULTS */
.result {
  display: none;
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white;
  padding: 40px;
  border-radius: 25px;
  margin-top: 30px;
  text-align: center;
  box-shadow: 0 25px 60px rgba(0, 184, 148, 0.4);
  animation: slideUp 0.5s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.tracking-code {
  font-family: 'Courier New', monospace;
  font-size: 36px;
  font-weight: bold;
  letter-spacing: 6px;
  background: rgba(0, 0, 0, 0.3);
  padding: 25px;
  border-radius: 20px;
  margin: 25px 0;
  text-transform: uppercase;
}

.customer-info {
  background: rgba(255, 255, 255, 0.3);
  padding: 25px;
  border-radius: 20px;
  margin: 25px 0;
}

.customer-info p {
  font-size: 20px;
  margin: 15px 0;
  font-weight: bold;
}

/* ADMIN PANEL */
.admin-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 2000;
  justify-content: center;
  align-items: center;
}

.admin-panel {
  background: linear-gradient(135deg, #111, #333);
  color: #ffcc00;
  padding: 50px;
  border-radius: 25px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
}

.admin-panel h2 {
  margin-bottom: 30px;
  font-size: 2.2em;
}

.admin-form input {
  width: 100%;
  padding: 20px;
  margin: 15px 0;
  border: 2px solid #ffcc00;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.1);
  color: #ffcc00;
  font-size: 18px;
  font-weight: bold;
}

.admin-form input::placeholder {
  color: rgba(255, 204, 0, 0.7);
}

.btn-admin {
  width: 100%;
  padding: 25px;
  background: linear-gradient(45deg, #ffcc00, #ffed4e);
  color: #111;
  border: none;
  border-radius: 20px;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 20px 0;
}

.btn-admin:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 45px rgba(255, 204, 0, 0.5);
}

.close-admin {
  position: absolute;
  top: 20px;
  right: 25px;
  background: none;
  border: none;
  color: #ffcc00;
  font-size: 30px;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .container { padding: 20px; }
  .header h1 { font-size: 2.2em; }
  #searchInput { font-size: 20px; padding: 20px 50px 20px 20px; }
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h1>🚚 DHL Tracking System</h1>
    <p>Sharm El Sheikh → Italia</p>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="GHL-XXXXXX أو أدخل كود التتبع" maxlength="12">
    <button class="search-btn" onclick="searchTracking()">🔍</button>
  </div>

  <div id="searchResult" class="result"></div>
</div>

<!-- 🔐 ADMIN BUTTON -->
<button class="admin-btn" onclick="toggleAdmin()">🔐</button>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <button class="close-admin" onclick="toggleAdmin()">✕</button>
    <h2>🛠️ لوحة التحكم</h2>
    <p style="margin-bottom: 30px; opacity: 0.9;">أضف زبون جديد</p>
    
    <form class="admin-form">
      <input id="adminName" placeholder="👤 الاسم الكامل" required>
      <input id="adminPhone" placeholder="📞 رقم الهاتف (+39...)" required>
      <input id="adminAddress" placeholder="📍 العنوان" required>
      <button type="button" class="btn-admin" onclick="addNewShipment()">➕ إضافة شحنة</button>
    </form>
    
    <div id="adminStatus" style="margin-top: 25px;"></div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "200911";
let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

function toggleAdmin() {
  const overlay = document.getElementById("adminOverlay");
  overlay.style.display = overlay.style.display === "flex" ? "none" : "flex";
}

function generateTrackingCode() {
  return "GHL-" + Math.floor(100000 + Math.random() * 900000);
}

function addNewShipment() {
  const name = document.getElementById("adminName").value.trim();
  const phone = document.getElementById("adminPhone").value.trim();
  const address = document.getElementById("adminAddress").value.trim();
  
  if (!name || !phone || !address) {
    alert("❌ يجب ملء جميع الحقول!");
    return;
  }
  
  const trackingCode = generateTrackingCode();
  
  const shipment = {
    code: trackingCode,
    name: name,
    phone: phone,
    address: address,
    status: "RICEVUTO ✅",
    date: new Date().toLocaleString('ar-EG')
  };
  
  shipments.unshift(shipment);
  localStorage.setItem("dhlShipments", JSON.stringify(shipments));
  
  document.getElementById("adminStatus").innerHTML = `
    <div style="background:rgba(0,184,148,0.3);padding:20px;border-radius:15px;color:#fff;font-weight:bold;">
      ✅ تم إضافة الشحنة بنجاح!<br>
      📦 كود التتبع: <strong style="color:#00ff41;font-size:20px;">${trackingCode}</strong>
    </div>
  `;
  
  // Clear form
  document.getElementById("adminName").value = "";
  document.getElementById("adminPhone").value = "";
  document.getElementById("adminAddress").value = "";
  
  setTimeout(() => {
    document.getElementById("adminStatus").innerHTML = "";
  }, 5000);
}

function searchTracking() {
  const input = document.getElementById("searchInput").value.trim().toUpperCase();
  const result = document.getElementById("searchResult");
  
  const shipment = shipments.find(s => s.code.toUpperCase() === input);
  
  if (!shipment) {
    result.innerHTML = `
      <div style="background:rgba(231,76,60,0.3);padding:30px;border-radius:20px;color:#fff;">
        <h2 style="font-size:2em;margin-bottom:15px;">❌ Tracking Not Found</h2>
        <p style="font-size:1.3em;">تحقق من الكود أو اتصل بالإدارة</p>
      </div>
    `;
    result.style.display = "block";
    return;
  }
  
  result.innerHTML = `
    <div style="text-align:center;">
      <h2 style="font-size:2.5em;margin-bottom:20px;color:#00b894;">✅ RICEVUTO DI CONSEGNA</h2>
      
      <div class="tracking-code">${shipment.code}</div>
      
      <div class="customer-info">
        <p>👤 <strong>${shipment.name}</strong></p>
        <p>📞 ${shipment.phone}</p>
        <p>📍 ${shipment.address}</p>
        <p>📅 ${shipment.date}</p>
      </div>
      
      <div style="background:rgba(0,184,148,0.4);padding:20px;border-radius:15px;margin-top:25px;font-size:1.3em;font-weight:bold;">
        🚚 ${shipment.status}
      </div>
    </div>
  `;
  
  result.style.display = "block";
  result.scrollIntoView({ behavior: 'smooth' });
}

// Enter key
document.getElementById("searchInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchTracking();
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALDO STORE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#2a5298;color:white;}

header{text-align:center;padding:15px;background:#ff4757;}

.tabs{text-align:center;margin:10px;}
.tabs button{padding:8px;margin:5px;border:none;border-radius:8px;cursor:pointer;}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
color:black;
border-radius:10px;
overflow:hidden;
position:relative;
font-size:13px;
}

.card img,.card video{
width:100%;
height:120px;
object-fit:cover;
}

.card-body{padding:6px;}
.card-body h3{font-size:14px;margin:5px 0;}
.price{color:red;font-size:13px;}

button.buy{
width:100%;
padding:6px;
font-size:12px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
cursor:pointer;
}

.del{
position:absolute;
top:5px;
right:5px;
background:red;
color:white;
border:none;
border-radius:5px;
font-size:10px;
cursor:pointer;
}

.passBox,.adminBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.passBox{background:rgba(0,0,0,0.8);}

.passInner{
background:white;
padding:20px;
border-radius:10px;
color:black;
}

.adminBox{
background:white;
color:black;
flex-direction:column;
padding:20px;
overflow:auto;
z-index:3000;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

#galleryBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:4000;
}

#thumbs{
display:flex;
gap:10px;
margin-top:10px;
overflow-x:auto;
}

@media(max-width:900px){
.products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.products{grid-template-columns:repeat(1,1fr);}
}
</style>
</head>

<body>

<header>
<h2>👟 ALDO STORE PRO</h2>
</header>

<div class="tabs">
<button onclick="filter('all')">Tutti</button>
<button onclick="filter('shoes')">👟 Scarpe</button>
<button onclick="filter('clothes')">👕 Abbigliamento</button>
<button onclick="filter('accessories')">💍 Accessori</button>
<button onclick="checkAdmin()">Admin</button>
</div>

<div class="products" id="products"></div>

<!-- PASSWORD -->
<div class="passBox" id="passBox">
<div class="passInner">
<h3>Password Admin</h3>
<input type="password" id="adminPass">
<button onclick="verifyAdmin()">Entra</button>
</div>
</div>

<!-- ADMIN -->
<div class="adminBox" id="adminBox">

<h2>Pannello Admin</h2>

<input id="nameInput" placeholder="Nome prodotto">
<input id="priceInput" placeholder="Prezzo">

<input type="file" id="fileInput" accept="image/*,video/*" multiple>

<select id="categoryInput">
<option value="shoes">👟 Scarpe</option>
<option value="clothes">👕 Abbigliamento</option>
<option value="accessories">💍 Accessori</option>
</select>

<button onclick="saveProduct()">Salva</button>
<button onclick="closeAdmin()">Chiudi</button>

</div>

<!-- GALLERY -->
<div id="galleryBox">
<div id="mediaContainer"></div>
<div id="thumbs"></div>
<button onclick="closeGallery()">Chiudi</button>
</div>

<script>

const ADMIN_PASSWORD="200911";

let products=JSON.parse(localStorage.getItem("products"))||[];
let currentFilter="all";

function save(){
localStorage.setItem("products",JSON.stringify(products));
}

function filter(t){currentFilter=t;render();}

function render(){

let html="";
let filtered=products.filter(p=>currentFilter==="all"||p.category===currentFilter);

filtered.forEach(p=>{

let i=products.indexOf(p);
let m=p.media[0];

html+=`
<div class="card">

<button class="del" onclick="deleteProduct(${i})">X</button>

<div onclick="openGallery(${i})">
${m.type==="video"
? `<video src="${m.src}" muted></video>`
: `<img src="${m.src}">`}
</div>

<div class="card-body">
<h3>${p.name}</h3>

<p style="font-size:11px;color:gray">
${p.category==="shoes"?"👟 Scarpe":
p.category==="clothes"?"👕 Abbigliamento":"💍 Accessori"}
</p>

<p class="price">${p.price} €</p>

<button class="buy" onclick="order('${p.name}',${p.price})">
Acquista
</button>
</div>

</div>`;
});

document.getElementById("products").innerHTML=html;
}

function saveProduct(){

let name=nameInput.value;
let price=priceInput.value;
let files=fileInput.files;
let category=categoryInput.value;

if(!name||!price||files.length===0){alert("Compila tutto");return;}

let media=[];
let loaded=0;

for(let f of files){

let reader=new FileReader();

reader.onload=e=>{

media.push({
src:e.target.result,
type:f.type.startsWith("video")?"video":"image"
});

loaded++;

if(loaded===files.length){

products.unshift({
name,
price:Number(price),
category,
media
});

save();
render();
clearForm();
}
};

reader.readAsDataURL(f);
}
}

function deleteProduct(i){
if(confirm("Eliminare?")){
products.splice(i,1);
save();
render();
}
}

function order(name,price){
let msg=`ORDINE: ${name} - ${price}€`;
window.open("https://wa.me/393510798667?text="+encodeURIComponent(msg));
}

/* ADMIN */
function checkAdmin(){
passBox.style.display="flex";
}

function verifyAdmin(){
if(adminPass.value===ADMIN_PASSWORD){
passBox.style.display="none";
adminBox.style.display="flex";
}
}

function closeAdmin(){
adminBox.style.display="none";
}

function clearForm(){
nameInput.value="";
priceInput.value="";
fileInput.value="";
}

/* GALLERY */
let currentMedia=[];
let currentIndex=0;

function openGallery(i){

currentMedia=products[i].media;
currentIndex=0;

showMedia();

let t="";
currentMedia.forEach((m,idx)=>{
t+=m.type==="video"
? `<video src="${m.src}" onclick="setMedia(${idx})" style="width:60px;height:60px"></video>`
: `<img src="${m.src}" onclick="setMedia(${idx})" style="width:60px;height:60px">`;
});

thumbs.innerHTML=t;
galleryBox.style.display="flex";
}

function showMedia(){

let m=currentMedia[currentIndex];

mediaContainer.innerHTML=
m.type==="video"
? `<video src="${m.src}" controls style="max-width:90%;max-height:70%"></video>`
: `<img src="${m.src}" style="max-width:90%;max-height:70%">`;
}

function setMedia(i){currentIndex=i;showMedia();}
function closeGallery(){galleryBox.style.display="none";}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALDO STORE PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#2a5298;
color:white;
}

header{
text-align:center;
padding:15px;
background:#ff4757;
}

.tabs{
text-align:center;
margin:10px;
}

.tabs button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.products{
display:flex;
gap:15px;
overflow-x:auto;
padding:15px;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.products::-webkit-scrollbar{display:none;}

.card{
min-width:250px;
flex:0 0 auto;
scroll-snap-align:start;
background:white;
color:black;
border-radius:12px;
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:10px}

.price{color:red;font-weight:bold}

button.buy{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
cursor:pointer;
}

.del{
position:absolute;
top:5px;
right:5px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.passBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.passInner{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
color:black;
}

.adminBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:white;
color:black;
display:none;
flex-direction:column;
padding:20px;
z-index:1000;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

.admin-item{
background:#eee;
margin:5px 0;
padding:10px;
border-radius:8px;
color:black;
}
</style>
</head>

<body>

<header>
<h2>👟 ALDO STORE PRO</h2>
<p>Admin System Full Control</p>
</header>

<div class="tabs">
<button onclick="filter('all')">All</button>
<button onclick="filter('shoes')">👟 Shoes</button>
<button onclick="filter('clothes')">👕 Clothes</button>
<button onclick="filter('accessories')">💍 Accessories</button>
<button onclick="checkAdmin()">⚙️ Admin</button>
</div>

<div class="products" id="products"></div>

<!-- PASSWORD -->
<div class="passBox" id="passBox">
<div class="passInner">
<h3>🔐 Admin Password</h3>
<input type="password" id="adminPass">
<button onclick="verifyAdmin()">Enter</button>
<button onclick="closePass()">Cancel</button>
</div>
</div>

<!-- ADMIN -->
<div class="adminBox" id="adminBox">

<h2>⚙️ Admin Panel</h2>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">

<select id="category">
<option value="shoes">Shoes</option>
<option value="clothes">Clothes</option>
<option value="accessories">Accessories</option>
</select>

<button onclick="saveProduct()">➕ Save</button>

<hr>

<h3>📦 Products List</h3>
<div id="adminList"></div>

</div>

<script>

const ADMIN_PASSWORD = "200911";

let products = JSON.parse(localStorage.getItem("products")) || [];
let currentFilter="all";
let editIndex=null;

/* SAVE STORAGE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
}

/* FILTER */
function filter(type){
currentFilter=type;
render();
}

/* MAIN RENDER */
function render(){

let html="";

let filtered = products.filter(p=>{
return currentFilter==="all" || p.category===currentFilter;
});

filtered.forEach((p,i)=>{

html+=`
<div class="card">

<button class="del" onclick="deleteProduct(${i})">X</button>

<img src="${p.media[0].src}">

<div class="card-body">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>

<button class="buy" onclick="order('${p.name}',${p.price})">
📱 WhatsApp
</button>

</div>
</div>
`;
});

document.getElementById("products").innerHTML=html;
}

/* ADMIN RENDER */
function renderAdmin(){

let html="";

products.forEach((p,i)=>{
html+=`
<div class="admin-item">
<b>${p.name}</b> - ${p.price}€
<br><br>

<button onclick="editProduct(${i})">✏️ Edit</button>
<button onclick="deleteProduct(${i})">🗑 Delete</button>
</div>
`;
});

document.getElementById("adminList").innerHTML=html;
}

/* SAVE OR EDIT */
function saveProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let img=document.getElementById("img").value;
let category=document.getElementById("category").value;

if(!name || !price || !img){
alert("Fill all fields");
return;
}

let product = {
name,
price:Number(price),
category,
media:[{src:img}]
};

if(editIndex!==null){
products[editIndex]=product;
editIndex=null;
}else{
products.push(product);
}

save();
render();
renderAdmin();
clearForm();
}

/* EDIT */
function editProduct(i){

let p=products[i];

document.getElementById("name").value=p.name;
document.getElementById("price").value=p.price;
document.getElementById("img").value=p.media[0].src;
document.getElementById("category").value=p.category;

editIndex=i;
}

/* DELETE */
function deleteProduct(i){
products.splice(i,1);
save();
render();
renderAdmin();
}

/* ORDER */
function order(name,price){

let msg=`🛒 ORDER:\n${name} - ${price}€`;

let url="https://wa.me/393510798667?text="+encodeURIComponent(msg);

window.open(url,"_blank");
}

/* ADMIN LOGIN */
function checkAdmin(){
document.getElementById("passBox").style.display="flex";
}

function closePass(){
document.getElementById("passBox").style.display="none";
}

function verifyAdmin(){

let pass=document.getElementById("adminPass").value;

if(pass===ADMIN_PASSWORD){
document.getElementById("passBox").style.display="none";
document.getElementById("adminBox").style.display="flex";
renderAdmin();
}else{
alert("❌ Wrong password");
}
}

/* CLEAR FORM */
function clearForm(){
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("img").value="";
}

render();

</script>

</body>
</html>

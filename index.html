<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  border-top:5px solid #ffcc00;
}

h1{
  color:#d40511;
  text-align:center;
}

.search-box{
  position:relative;
  margin:20px 0;
}

#searchInput{
  width:100%;
  padding:15px;
  font-size:18px;
  text-transform:uppercase;
}

.search-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:#ffcc00;
  border:none;
  padding:10px 15px;
  cursor:pointer;
  border-radius:8px;
}

.result{
  display:none;
  background:#fff;
  border-left:5px solid #ffcc00;
  padding:20px;
  margin-top:20px;
}

.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#111;
  color:#ffcc00;
  border:none;
  font-size:25px;
}

.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.panel{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

.panel input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

img{
  max-width:200px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>DHL Shipment Tracking</h1>

<div class="search-box">
<input id="searchInput" placeholder="GHL-XXXXXX">
<button class="search-btn" onclick="search()">🔍</button>
</div>

<div id="result" class="result"></div>

</div>

<button class="admin-btn" onclick="openAdmin()">🔐</button>

<div class="admin" id="admin">
<div class="panel">

<h3>Admin Panel</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Gmail">
<input id="price" placeholder="Price">

<!-- 📷 من المعرض -->
<input type="file" id="image" accept="image/*">

<button onclick="add()">➕ Add Shipment</button>

</div>
</div>

<script>

const PASS="200911";
let data=JSON.parse(localStorage.getItem("shipments"))||[];

function openAdmin(){
let p=prompt("Password");
if(p===PASS){
document.getElementById("admin").style.display="flex";
}else alert("Wrong password");
}

function add(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;
const gmail=document.getElementById("gmail").value;
const price=document.getElementById("price").value;
const file=document.getElementById("image").files[0];

if(!file){
alert("اختر صورة من المعرض");
return;
}

const reader=new FileReader();

reader.onload=function(){

const code="GHL-"+Math.floor(Math.random()*900000+100000);

data.unshift({
code,
name,
phone,
address,
gmail,
price,
image:reader.result
});

localStorage.setItem("shipments",JSON.stringify(data));

alert("✅ Added\nTracking Code: "+code);

};

reader.readAsDataURL(file);
}

function search(){

let v=document.getElementById("searchInput").value.toUpperCase();
let r=document.getElementById("result");

let f=data.find(x=>x.code===v);

if(!f){
r.innerHTML="❌ Not Found";
}else{
r.innerHTML=`
<h2>📦 Tracking: ${f.code}</h2>
<p>👤 ${f.name}</p>
<p>📞 ${f.phone}</p>
<p>📍 ${f.address}</p>
<p>📧 ${f.gmail}</p>
<p>💰 ${f.price} €</p>
<img src="${f.image}">
`;
}

r.style.display="block";
}

</script>

</body>
</html>

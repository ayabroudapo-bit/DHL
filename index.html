<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALDO SHOP</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* HEADER */
header{
text-align:center;
padding:15px;
background:#ff4757;
}

/* TABS */
.tabs{
text-align:center;
margin:10px;
}

.tabs button{
padding:6px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
padding:6px;
}

/* CARD */
.card{
background:#111;
border-radius:8px;
overflow:hidden;
}

/* IMAGE / VIDEO */
.card img,.card video{
width:100%;
height:110px;
object-fit:cover;
display:block;
}

/* TEXT BELOW IMAGE */
.card-body{
text-align:center;
padding:8px;
}

.card-body h3{
margin:5px 0;
font-size:13px;
}

.price{
margin:0 0 6px 0;
color:#ff4d4d;
font-weight:bold;
font-size:12px;
}

/* BUY BUTTON */
button.buy{
width:100%;
padding:6px;
border:none;
background:#25D366;
color:white;
font-weight:bold;
cursor:pointer;
}

/* ADMIN + PASSWORD */
.adminBox,.passBox{
position:fixed;
top:0;left:0;right:0;bottom:0;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.passBox{
background:rgba(0,0,0,0.9);
}

.passInner{
background:white;
color:black;
padding:20px;
border-radius:10px;
}

.adminBox{
background:white;
color:black;
flex-direction:column;
padding:15px;
overflow:auto;
}

input,select{
width:100%;
padding:6px;
margin:5px 0;
}

/* RESPONSIVE */
@media(max-width:900px){
.products{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:600px){
.products{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:400px){
.products{grid-template-columns:repeat(1,1fr);}
}
</style>
</head>

<body>

<header>
<h2>🛍 ALDO SHOP</h2>
</header>

<div class="tabs">
<button onclick="filter('all')">All</button>
<button onclick="filter('shoes')">👟 أحذية</button>
<button onclick="filter('clothes')">👕 ملابس</button>
<button onclick="filter('watches')">⌚ ساعات</button>
<button onclick="openAdmin()">Admin</button>
</div>

<div class="products" id="products"></div>

<!-- PASSWORD -->
<div class="passBox" id="passBox">
<div class="passInner">
<h3>Password</h3>
<input type="password" id="pass">
<button onclick="checkPass()">Enter</button>
</div>
</div>

<!-- ADMIN -->
<div class="adminBox" id="adminBox">

<h2>لوحة التحكم</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">

<select id="category">
<option value="shoes">👟 أحذية</option>
<option value="clothes">👕 ملابس</option>
<option value="watches">⌚ ساعات</option>
</select>

<input type="file" id="mediaInput" accept="image/*,video/*" multiple>

<button onclick="addProduct()">إضافة</button>
<button onclick="closeAdmin()">إغلاق</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let currentFilter="all";
let click=0;

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
}

/* FILTER */
function filter(t){
currentFilter=t;
render();
}

/* RENDER */
function render(){

let html="";

let filtered = products.filter(p => currentFilter==="all" || p.category===currentFilter);

filtered.forEach((p,i)=>{

let m = p.media[0];

html += `
<div class="card">

<!-- MEDIA TOP -->
<div onclick="openGallery(${i})">
${m.type==="video"
? `<video src="${m.src}" muted></video>`
: `<img src="${m.src}">`}
</div>

<!-- NAME + PRICE BELOW -->
<div class="card-body">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>
</div>

<!-- BUY BUTTON -->
<button class="buy" onclick="order('${p.name}',${p.price})">
📱 Acquista
</button>

</div>
`;
});

document.getElementById("products").innerHTML = html;
}

/* ORDER */
function order(name,price){
window.open("https://wa.me/393510798667?text="+encodeURIComponent(name+" - "+price+"€"));
}

/* ADMIN OPEN */
function openAdmin(){
click++;
if(click>=10){
passBox.style.display="flex";
click=0;
}
}

/* CHECK PASSWORD */
function checkPass(){
if(pass.value==="200911"){
passBox.style.display="none";
adminBox.style.display="flex";
}else{
alert("❌ Wrong password");
}
}

/* CLOSE ADMIN */
function closeAdmin(){
adminBox.style.display="none";
}

/* ADD PRODUCT */
function addProduct(){

let files = mediaInput.files;

if(!name.value || !price.value || files.length===0){
alert("عمر جميع الخانات");
return;
}

let media=[];
let loaded=0;

for(let f of files){

let reader=new FileReader();

reader.onload=e=>{

media.push({
src:e.target.result,
type:f.type.startsWith("video")?"video":"image"
});

loaded++;

if(loaded===files.length){

products.push({
name:name.value,
price:price.value,
category:category.value,
media:media
});

save();
render();
clear();
}
};

reader.readAsDataURL(f);
}
}

/* CLEAR */
function clear(){
name.value="";
price.value="";
mediaInput.value="";
}

render();

</script>

</body>
</html>

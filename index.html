<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👟 Aldo Footlocker - Negozio Online</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
    color: #fff;
    padding-bottom: 150px;
    min-height: 100vh;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 20px;
    background: linear-gradient(135deg, #14142b 0%, #1a1a3e 100%);
    font-size: 28px;
    font-weight: 800;
    color: #8b5cf6;
    box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
    position: sticky;
    top: 0;
    z-index: 100;
    letter-spacing: 2px;
}

/* CATEGORIES */
.cats {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    padding: 25px 20px;
    background: rgba(20, 20, 43, 0.8);
    backdrop-filter: blur(10px);
}

.cats button {
    padding: 12px 22px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(145deg, #2a2a50, #363662);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.cats button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
}

.cats button.active {
    background: linear-gradient(135deg, #8b5cf6, #a78bfa);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.6);
    transform: translateY(-2px);
}

/* PRODUCTS GRID 4x4 */
.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 30px 25px;
    max-width: 1400px;
    margin: 0 auto;
}

.card {
    background: linear-gradient(145deg, #1c1c3a, #252552);
    border-radius: 20px;
    overflow: hidden;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    aspect-ratio: 1 / 1.4;
    position: relative;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(139, 92, 246, 0.2);
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(145deg, rgba(139, 92, 246, 0.1), transparent);
    opacity: 0;
    transition: 0.4s;
    z-index: 1;
}

.card:hover {
    transform: translateY(-15px) scale(1.03);
    box-shadow: 0 25px 50px rgba(139, 92, 246, 0.5);
    border-color: rgba(139, 92, 246, 0.5);
}

.card:hover::before {
    opacity: 1;
}

.card img {
    width: 100%;
    height: 70%;
    object-fit: cover;
    transition: 0.4s;
    z-index: 2;
    position: relative;
}

.card:hover img {
    transform: scale(1.08);
}

.card h4 {
    font-size: 13px;
    margin: 10px 15px 5px;
    font-weight: 700;
    line-height: 1.3;
    z-index: 2;
    position: relative;
}

.card p {
    font-size: 14px;
    margin: 0 15px 15px;
    color: #8b5cf6;
    font-weight: 800;
    letter-spacing: 0.5px;
    z-index: 2;
    position: relative;
}

/* RESPONSIVE GRID */
@media (max-width: 1300px) {
    .products { grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 25px 20px; }
}

@media (max-width: 900px) {
    .products { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px 15px; }
}

@media (max-width: 600px) {
    .products { grid-template-columns: 1fr; gap: 18px; padding: 20px 15px; }
    header { font-size: 22px; padding: 20px 15px; }
}

/* POPUP */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(15px);
}

.popup-box {
    background: linear-gradient(145deg, #1c1c3a, #252552);
    padding: 40px 30px;
    border-radius: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
    border: 2px solid rgba(139, 92, 246, 0.4);
    animation: popupSlide 0.5s ease-out;
    position: relative;
}

@keyframes popupSlide {
    from { transform: scale(0.7) translateY(50px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
}

.popup-box img {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
}

.popup-box h3 {
    margin: 0 0 12px;
    font-size: 24px;
    font-weight: 800;
    color: #fff;
}

.popup-box p {
    margin: 0 0 25px;
    font-size: 22px;
    color: #8b5cf6;
    font-weight: 800;
}

.wa-btn {
    display: inline-block;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: #fff;
    padding: 18px 35px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    margin-bottom: 20px;
    box-shadow: 0 12px 35px rgba(37, 211, 102, 0.5);
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.wa-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 45px rgba(37, 211, 102, 0.7);
}

.close-popup {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    border: none;
    padding: 15px 30px;
    border-radius: 18px;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
    transition: 0.3s;
    text-transform: uppercase;
}

.close-popup:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(239, 68, 68, 0.6);
}

/* FLOATING WA */
.float-wa {
    position: fixed;
    bottom: 100px;
    left: 25px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    padding: 18px 22px;
    border-radius: 50px;
    color: #fff;
    text-decoration: none;
    font-weight: 800;
    font-size: 15px;
    box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
    transition: all 0.3s ease;

}

@keyframes float {
    0%, 100% { transform: translateY(0px); }

}

.float-wa:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 25px 50px rgba(37, 211, 102, 0.7);
}

/* ADMIN BUTTON */
.admin-btn {

    bottom: 25px;
    left: 25px;
    background: linear-gradient(135deg, #8b5cf6, #a78bfa);
    border: none;
    padding: 18px 22px;
    border-radius: 20px;
    color: #fff;
    cursor: pointer;
    font-weight: 800;
    font-size: 14px;
    box-shadow: 0 15px 40px rgba(139, 92, 246, 0.6);

.admin-btn:hover {

/* ADMIN PANEL */
.admin-overlay {

<body>

                <label class="form-label">📛 NOME PRODOTTO</label>
                <input type="text" id="productName" class="form-input" placeholder="Es: Nike Air Force 1" maxlength="60">
            </div>
            
            <div class="form-group">
                <label class="form-label">💰 PREZZO</label>
                <input type="text" id="productPrice" class="form-input" placeholder="Es: 120€" maxlength="20">
            </div>
            
            <div class="form-group">
                <label class="form-label">🏷️ CATEGORIA</label>
                <select id="productCategory" class="form-select">
                    <option value="shoes">👟 Scarpe</option>
                    <option value="clothes">👕 Vestiti</option>
                    <option value="acc">💍 Accessori</option>
                    <option value="perfume">🌹 Profumi</option>

                    <div class="radio-group">

<script>
class AldoStore {
    constructor() {
        this.products = JSON.parse(localStorage.getItem('aldo_products')) || [];
        this.currentFilter = 'all';
        this.currentTab = 'add';
        this.previewImages = [];
        this.init();
    }
    
    init() {
        this.loadDefaultProducts();
        this.renderProducts();
        this.bindEvents();
    }
    
    loadDefaultProducts() {
        if (this.products.length === 0) {
            this.products = [
                {id: 1, name: 'Nike Air Force 1', price: '120€', cat: 'shoes', images: ['https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=500']},
                {id: 2, name: 'Adidas Hoodie', price: '80€', cat: 'clothes', images: ['https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500']},
                {id: 3, name: 'Rolex Submariner', price: '250€', cat: 'acc', images: ['https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500']},
                {id: 4, name: 'Dior Sauvage', price: '95€', cat: 'perfume', images: ['https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=500']},
                {id: 5, name: 'Jordan 1', price: '150€', cat: 'shoes', images: ['https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500']},
                {id: 6, name: 'Gucci Belt', price: '180€', cat: 'acc', images: ['https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500']}
            ];
            this.saveProducts();
        }
    }
    
    saveProducts() {
        localStorage.setItem('aldo_products', JSON.stringify(this.products));
    }
    
    bindEvents() {
        // Image type switch
        document.querySelectorAll('input[name="imageType"]').forEach(radio => {
            radio.addEventListener('change', (e) => this.handleImageTypeChange(e.target.value));
        });
        
        // Image URL input
        document.getElementById('imageUrl').addEventListener('input', (e) => this.handleUrlInput(e.target.value));
        
        // Image file input
        document.getElementById('imageFile').addEventListener('change', (e) => this.handleFileInput(e.target.files));
    }
    
    handleImageTypeChange(type) {
        const urlInput = document.getElementById('imageUrl');
        const fileInput = document.getElementById('imageFile');
        
        if (type === 'url') {
            urlInput.style.display = 'block';
            fileInput.style.display = 'none';
        } else {
            urlInput.style.display = 'none';
            fileInput.style.display = 'block';
        }
    }
    
    handleUrlInput(url) {
        const preview = document.getElementById('imagePreview');
        this.previewImages = [];
        
        if (url.trim()) {
            preview.innerHTML = `<img src="${url}" class="preview-image" onerror="this.style.display='none'" onload="this.style.display='block'">`;
            this.previewImages = [url];
        } else {
            preview.innerHTML = '';
        }
    }
    
    handleFileInput(files) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        this.previewImages = [];
        
        Array.from(files).slice(0, 4).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-image';
                preview.appendChild(img);
                this.previewImages.push(e.target.result);
            };
            reader.readAsDataURL(file);
        });
    }
    
    async addNewProduct() {
        const name = document.getElementById('productName').value.trim();
        const price = document.getElementById('productPrice').value.trim();
        const category = document.getElementById('productCategory').value;
        
        if (!name || !price || this.previewImages.length === 0) {
            this.showStatus('addStatus', '⚠️ Completa tutti i campi e seleziona un\'immagine!', 'error');
            return;
        }
        
        const statusEl = document.getElementById('addStatus');
        statusEl.textContent = '⏳ Aggiunta in corso...';
        statusEl.className = 'status-message status-loading';
        statusEl.style.display = 'block';
        
        // Simulate upload delay
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        const newProduct = {
            id: Date.now(),
            name,
            price,
            cat: category,
            images: this.previewImages.slice(0, 1) // Use first image
        };
        
        this.products.unshift(newProduct);
        this.saveProducts();
        this.renderProducts();
        this.renderAdminList();
        
        statusEl.textContent = '✅ Prodotto aggiunto con successo!';
        statusEl.className = 'status-message status-success';
        
        setTimeout(() => {
            document.getElementById('adminOverlay').style.display = 'none';
            this.resetAddForm();
        }, 2000);
    }
    
    resetAddForm() {
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('imageUrl').value = '';
        document.getElementById('imageFile').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        this.previewImages = [];
        document.querySelector('input[name="imageType"][value="url"]').checked = true;
        document.getElementById('imageUrl').style.display = 'block';
        document.getElementById('imageFile').style.display = 'none';
        document.getElementById('addStatus').style.display = 'none';
    }
    
    deleteProduct(id) {
        if (confirm('🗑️ Sei sicuro di voler eliminare questo prodotto?')) {
            this.products = this.products.filter(p => p.id !== id);
            this.saveProducts();
            this.renderProducts();
            this.renderAdminList();
        }
    }
    
    renderProducts() {
        const container = document.getElementById('productsContainer');
        const filtered = this.products.filter(p => this.currentFilter === 'all' || p.cat === this.currentFilter);
        
        container.innerHTML = filtered.map(product => `
            <div class="card" onclick="store.openProduct(${product.id})">
                <img src="${product.images[0]}" 
                     onerror="this.src='https://via.placeholder.com/400x300/2a2a50/fff?text=Nessuna+Immagine'" 
                     loading="lazy">
                <h4>${product.name}</h4>
                <p>${product.price}</p>
            </div>
        `).join('');
    }
    
    openProduct(id) {
        const product = this.products.find(p => p.id === id);
        if (!product) return;
        
        document.getElementById('popupImage').src = product.images[0];
        document.getElementById('popupImage').onerror = () => {
            document.getElementById('popupImage').src = 'https://via.placeholder.com/400x400/2a2a50/fff?text=Nessuna+Immagine';
        };
        document.getElementById('popupTitle').textContent = product.name;
        document.getElementById('popupPrice').textContent = product.price;
        document.getElementById('whatsappLink').href = `https://wa.me/393510798667?text=${encodeURIComponent(`${product.name} - ${product.price}`)}`;
        
        document.getElementById('productPopup').style.display = 'flex';
    }
    
    closePopup() {
        document.getElementById('productPopup').style.display = 'none';
    }
    
    filterProducts(category, button) {
        this.currentFilter = category;
        document.querySelectorAll('.cats button').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        this.renderProducts();
    }
    
    switchAdminTab(tab) {
        this.currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab + 'Tab').classList.add('active');
        
        if (tab === 'manage') {
            this.renderAdminList();
        }
    }
    
    renderAdminList() {
        const container = document.getElementById('productsList');
        const categoryNames = {
            shoes: 'Scarpe',
            clothes: 'Vestiti',
            acc: 'Accessori',
            perfume: 'Profumi'
        };
        
        container.innerHTML = this.products.map(product => `
            <div class="product-item ${product.cat}">
                <div style="display: flex; align-items: center;">
                    <img src="${product.images[0]}" class="product-preview" 
                         onerror="this.src='https://via.placeholder.com/60/2a2a50/fff?text=?'">
                    <div class="product-info">
                        <h4>${product.name}</h4>
                        <p>${product.price} • <span class="status-badge status-${product.cat}">${categoryNames[product.cat]}</span></p>
                    </div>
                </div>
                <button class="btn btn-danger" onclick="store.deleteProduct(${product.id})">🗑️</button>
            </div>
        `).join('');
    }
    
    showStatus(elementId, message, type) {
        const element = document.getElementById(elementId);
        element.textContent = message;
        element.className = `status-message status-${type}`;
        element.style.display = 'block';
        setTimeout(() => element.style.display = 'none', 4000);
    }
    
    openAdminPanel() {
        const password = prompt('🔐 PASSWORD AMMINISTRATORE:');
        if (password === '200911') {
            document.getElementById('adminOverlay').style.display = 'flex';
            this.switchAdminTab('add');
        } else {
            alert('❌ Password errata!');
        }
    }
}

// Initialize Store
const store = new AldoStore();

// Global functions for onclick handlers
window.filterProducts = (category, button) => store.filterProducts(category, button);
window.openAdminPanel = () => store.openAdminPanel();
window.addNewProduct = () => store.addNewProduct();
window.resetAddForm = () => store.resetAddForm();
window.deleteProduct = (id) => store.deleteProduct(id);
window.switchAdminTab = (tab) => store.switchAdminTab(tab);
window.closePopup = () => store.closePopup();
</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALDO FOOTLOCKER</title>

<style>
body{
margin:0;
font-family:Arial;
background:#2a5298;
color:white;
}

header{
text-align:center;
padding:15px;
background:#ff4757;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

/* 4 products per row */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

@media(max-width:900px){
.products{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.products{grid-template-columns:repeat(1,1fr);}
}

.card{
background:white;
color:black;
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:10px}

.price{color:red;font-weight:bold}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
cursor:pointer;
}

/* overlay */
.overlay{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
flex-direction:column;
}

.overlay img,
.overlay video{
max-width:90%;
max-height:80%;
margin:10px;
border-radius:10px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
width:300px;
}

.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h2>👟 ALDO FOOTLOCKER</h2>
<p>Official Store</p>
</header>

<div class="adminBtn" onclick="openLogin()">🔐 Admin</div>

<div class="container">
<div class="products" id="products"></div>
</div>

<!-- GALLERY -->
<div class="overlay" id="galleryBox" onclick="closeGallery()">
<div id="galleryContent"></div>
</div>

<!-- LOGIN -->
<div class="overlay" id="loginBox">
<div class="box">
<h3>🔐 Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN -->
<div class="overlay" id="adminBox">
<div class="box">
<h3>🛠️ Admin Panel</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input type="file" id="imageFile" multiple accept="image/*,video/*">

<button onclick="addProduct()">➕ Add</button>
<button onclick="logout()" style="background:red">Exit</button>

<hr>

<h3>📦 Products</h3>
<div id="adminList"></div>

</div>
</div>

<script>

let ADMIN_PASSWORD = "200911";
let isAdmin = false;

let products = JSON.parse(localStorage.getItem("products")) || [];

/* RENDER */
function render(){

let html="";

if(products.length===0){
html="<p style='text-align:center'>🚫 No products</p>";
}

products.forEach((p,i)=>{

html+=`
<div class="card" onclick="openGalleryByIndex(${i})">

<img src="${p.media?.[0]?.src || ''}">

<div class="card-body">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>

<button onclick="event.stopPropagation();order('${p.name}','${p.price}')">
📱 WhatsApp Order
</button>

</div>
</div>
`;

});

document.getElementById("products").innerHTML=html;

renderAdmin();
}

/* GALLERY */
function openGalleryByIndex(i){

let media = products[i]?.media || [];

let html="";

media.forEach(m=>{

if(m.type==="video"){
html+=`<video src="${m.src}" controls></video>`;
}else{
html+=`<img src="${m.src}">`;
}

});

document.getElementById("galleryContent").innerHTML=html;
document.getElementById("galleryBox").style.display="flex";

}

function closeGallery(){
document.getElementById("galleryBox").style.display="none";
}

/* WHATSAPP 🇮🇹 */
function order(name,price){

let msg = `🛒 ALDO FOOTLOCKER ORDER:
Product: ${name}
Price: ${price}€`;

let url = "https://wa.me/393510798667?text=" + encodeURIComponent(msg);

window.open(url,"_blank");
}

/* LOGIN */
function openLogin(){
document.getElementById("loginBox").style.display="flex";
}

function login(){
let p=document.getElementById("pass").value;

if(p===ADMIN_PASSWORD){
isAdmin=true;
document.getElementById("loginBox").style.display="none";
document.getElementById("adminBox").style.display="flex";
render();
}else{
alert("❌ Wrong password");
}
}

function logout(){
isAdmin=false;
document.getElementById("adminBox").style.display="none";
}

/* ADD PRODUCT */
function addProduct(){

if(!isAdmin) return;

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let files=document.getElementById("imageFile").files;

if(!name || !price || files.length===0){
alert("Fill all fields");
return;
}

let media=[];
let count=0;

for(let file of files){

let reader=new FileReader();

reader.onload=function(e){

media.push({
type:file.type.startsWith("video")?"video":"image",
src:e.target.result
});

count++;

if(count===files.length){

products.push({name,price,media});
localStorage.setItem("products",JSON.stringify(products));
render();

}

};

reader.readAsDataURL(file);
}

}

/* ADMIN LIST */
function renderAdmin(){

let html="";

products.forEach((p,i)=>{
html+=`
<p>${p.name} - ${p.price}€
<button onclick="products.splice(${i},1);localStorage.setItem('products',JSON.stringify(products));render()" style="background:red;padding:5px;margin-left:5px;">🗑</button>
</p>
`;
});

document.getElementById("adminList").innerHTML=html;
}

render();

</script>

</body>
</html>
